# 용연 정수장 독립 서버 (단일 서비스)
services:
  api-yongyeon:
    image: "epsene-yongyeon:${VERSION:-latest}"
    container_name: epsene-yongyeon
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-8002}:8002"
    env_file:
      # required: false 는 docker compose v2.24+ — 구버전이면 사이트 루트에 `touch .env`
      - path: ../.env
        required: false
    environment:
      - PLANT_ID=yongyeon
    volumes:
      - ../models:/app/models:ro
      - ../dataset:/app/dataset:ro
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
